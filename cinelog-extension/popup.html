<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CineLog</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px;
      min-height: 200px;
      background: #080810;
      color: #fff;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 14px;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 18px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .header-logo { font-size: 22px; }
    .header-title { font-size: 16px; font-weight: 700; color: #fff; }
    .header-sub   { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 1px; }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #6b7280;
      margin-left: auto;
      flex-shrink: 0;
    }
    .status-dot.connected { background: #34c759; box-shadow: 0 0 6px #34c759; }

    /* ── Sections ── */
    .section { padding: 16px 18px; }
    .section + .section { border-top: 1px solid rgba(255,255,255,0.05); }

    .label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: rgba(255,255,255,0.35);
      margin-bottom: 10px;
    }

    /* ── Form ── */
    .input {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      color: #fff;
      font-size: 14px;
      padding: 10px 12px;
      outline: none;
      margin-bottom: 10px;
    }
    .input:focus { border-color: #818cf8; }
    .input::placeholder { color: rgba(255,255,255,0.25); }

    .btn {
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn:disabled { opacity: 0.4; cursor: default; }
    .btn-primary  { background: #818cf8; color: #000; }
    .btn-primary:hover:not(:disabled) { opacity: 0.9; }
    .btn-secondary { background: rgba(255,255,255,0.07); color: #fff; margin-top: 8px; }
    .btn-secondary:hover:not(:disabled) { background: rgba(255,255,255,0.12); }
    .btn-danger { background: rgba(255,59,48,0.15); color: #ff3b30; border: 1px solid rgba(255,59,48,0.25); margin-top: 8px; }

    /* ── Room card ── */
    .room-card {
      background: rgba(129,140,248,0.08);
      border: 1px solid rgba(129,140,248,0.18);
      border-radius: 14px;
      padding: 14px 16px;
      margin-bottom: 12px;
    }
    .room-code {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: 0.25em;
      color: #818cf8;
      margin-bottom: 4px;
    }
    .room-title { font-size: 12px; color: rgba(255,255,255,0.45); }

    /* ── Members ── */
    .members { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
    .member {
      display: flex;
      align-items: center;
      gap: 5px;
      background: rgba(255,255,255,0.05);
      border-radius: 100px;
      padding: 4px 8px 4px 4px;
      font-size: 12px;
    }
    .member-avatar {
      width: 20px; height: 20px;
      border-radius: 50%;
      background: rgba(129,140,248,0.3);
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700; color: #818cf8;
      overflow: hidden;
    }
    .member-avatar img { width: 100%; height: 100%; object-fit: cover; }

    /* ── Join input ── */
    .join-input {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.25em;
      text-align: center;
    }

    /* ── Error / info ── */
    .error-msg {
      background: rgba(255,59,48,0.1);
      border: 1px solid rgba(255,59,48,0.2);
      color: #ff3b30;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 13px;
      margin-bottom: 10px;
    }
    .info-msg {
      color: rgba(255,255,255,0.4);
      font-size: 13px;
      text-align: center;
      padding: 12px 0 4px;
    }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      gap: 4px;
      background: rgba(255,255,255,0.04);
      border-radius: 10px;
      padding: 3px;
      margin-bottom: 14px;
    }
    .tab {
      flex: 1;
      padding: 7px 0;
      border-radius: 8px;
      border: none;
      background: transparent;
      color: rgba(255,255,255,0.4);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
    }
    .tab.active { background: rgba(129,140,248,0.15); color: #818cf8; }

    #view-loading { padding: 32px 18px; text-align: center; color: rgba(255,255,255,0.3); }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <span class="header-logo">🎬</span>
    <div>
      <div class="header-title">CineLog</div>
      <div class="header-sub">Watch Together</div>
    </div>
    <div class="status-dot" id="status-dot"></div>
  </div>

  <!-- Dynamic content -->
  <div id="view-loading">Loading…</div>
  <div id="view-login" style="display:none">
    <div class="section">
      <div class="label">Sign in to CineLog</div>
      <input class="input" type="email" id="login-email" placeholder="Email" />
      <input class="input" type="password" id="login-password" placeholder="Password" />
      <div class="error-msg" id="login-error" style="display:none"></div>
      <button class="btn btn-primary" id="login-btn">Sign In</button>
    </div>
  </div>

  <div id="view-main" style="display:none">
    <!-- Active room -->
    <div id="section-room" style="display:none" class="section">
      <div class="label">Active Room</div>
      <div class="room-card">
        <div class="room-code" id="room-code-display">——</div>
        <div class="room-title" id="room-title-display"></div>
        <div class="members" id="members-list"></div>
      </div>
      <button class="btn btn-danger" id="leave-btn">Leave Room</button>
    </div>

    <!-- No room — create / join -->
    <div id="section-no-room" class="section">
      <div class="tabs">
        <button class="tab active" id="tab-join" data-tab="join">Join Room</button>
        <button class="tab" id="tab-create" data-tab="create">Create</button>
      </div>

      <div id="panel-join">
        <div class="error-msg" id="join-error" style="display:none"></div>
        <input class="input join-input" id="join-code-input" placeholder="ROOM CODE" maxlength="6" />
        <button class="btn btn-primary" id="join-btn">Join</button>
      </div>

      <div id="panel-create" style="display:none">
        <p class="info-msg">Open a movie on CineLog and click "Watch Together" to create a room, then come back here to see your room code.</p>
      </div>
    </div>

    <!-- Footer -->
    <div class="section">
      <button class="btn btn-secondary" id="logout-btn">Sign Out</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
